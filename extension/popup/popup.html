<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Morphix Restyle</title>
    <link rel="stylesheet" href="popup.css">
    <script>
      // Theme: dark by default; respect saved preference
      (function() {
        var t = localStorage.getItem('morphix-theme');
        if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
      })();
    </script>
  </head>
  <body>
    <main class="popup">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">M</span>
          <div>
            <p class="eyebrow">Morphix</p>
            <h1>Style workspace</h1>
          </div>
        </div>
        <button class="icon-button" id="options" type="button" aria-label="Open options" title="Options">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
            <path d="M19.43 12.98c.04-.32.07-.65.07-.98s-.02-.66-.07-.98l2.08-1.63a.5.5 0 0 0 .12-.64l-1.97-3.41a.5.5 0 0 0-.61-.22l-2.45.99a7.26 7.26 0 0 0-1.69-.98l-.37-2.6A.5.5 0 0 0 14.05 2h-4.1a.5.5 0 0 0-.49.42l-.37 2.6c-.6.24-1.16.56-1.69.98l-2.45-.99a.5.5 0 0 0-.61.22L2.37 8.64a.5.5 0 0 0 .12.64l2.08 1.63c-.04.32-.07.65-.07.98s.02.66.07.98l-2.08 1.63a.5.5 0 0 0-.12.64l1.97 3.41c.13.23.4.33.61.22l2.45-.99c.52.4 1.08.73 1.69.98l.37 2.6c.04.25.25.42.49.42h4.1c.24 0 .45-.17.49-.42l.37-2.6c.6-.24 1.16-.56 1.69-.98l2.45.99c.22.1.49.01.61-.22l1.97-3.41a.5.5 0 0 0-.12-.64l-2.08-1.63Z"></path>
          </svg>
        </button>
        <button class="icon-button" id="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle light/dark mode">
          <span id="theme-icon" class="theme-icon" aria-hidden="true">
            <svg class="sun-icon" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2.5M12 19.5V22M4.93 4.93 6.7 6.7M17.3 17.3l1.77 1.77M2 12h2.5M19.5 12H22M4.93 19.07 6.7 17.3M17.3 6.7l1.77-1.77"></path>
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24">
              <path d="M20.5 14.5A8.5 8.5 0 0 1 9.5 3.5 8.5 8.5 0 1 0 20.5 14.5Z"></path>
            </svg>
          </span>
        </button>
      </header>

      <section class="site-card">
        <span id="site-status" class="site-status">Checking this site...</span>
      </section>

      <section class="active-style hidden" id="active-style">
        <div class="workspace-heading">
          <div>
            <p class="eyebrow">Current style</p>
            <h2 id="active-name">Untitled style</h2>
          </div>
          <span class="state-pill" id="active-state">Active</span>
        </div>
        <p class="description" id="active-description"></p>
        <div class="compact-actions">
          <button id="toggle-style" type="button">Pause</button>
          <button id="export-style" type="button" title="Export as .morphix file">Export</button>
          <button id="share-gallery" type="button" title="Share to Morphix Gallery">Share</button>
          <button id="delete-style" class="danger-button" type="button">Delete</button>
          <button id="show-versions" type="button">Versions</button>
        </div>
        <div class="versions hidden" id="versions"></div>
      </section>

      <section class="compose" id="compose">
        <label id="prompt-label" for="prompt">What should change?</label>
        <textarea id="prompt" rows="4" placeholder="Make this page calmer, premium, and easier to read."></textarea>

        <div class="prompt-chips" aria-label="Prompt ideas">
          <button class="chip" type="button" data-prompt="Make this page calmer and easier to read.">Calmer</button>
          <button class="chip" type="button" data-prompt="Give this page a premium editorial style.">Premium</button>
          <button class="chip" type="button" data-prompt="Remove distractions and make the main content stand out.">Focus</button>
          <button class="chip" type="button" data-prompt="Improve contrast, spacing, and button clarity.">Clarity</button>
        </div>

        <fieldset class="scope-picker" id="scope-picker">
          <legend>Keep as</legend>
          <label><input type="radio" name="scope" value="session"> Session</label>
          <label><input type="radio" name="scope" value="exact" checked> Page</label>
          <label><input type="radio" name="scope" value="domain"> Site</label>
          <label><input type="radio" name="scope" value="library"> Library</label>
        </fieldset>

        <div class="bar">
          <p class="hint" id="compose-hint">Preview the style first. Keep it only if it works.</p>
          <button id="apply" type="button">
            <span class="button-label">Preview</span>
          </button>
        </div>
      </section>

      <section class="status hidden" id="status" aria-live="polite"></section>

      <section class="preview hidden" id="preview">
        <div class="review-header">
          <span class="success-dot" aria-hidden="true"></span>
          <div>
            <p class="eyebrow">Preview ready</p>
            <p class="description" id="description"></p>
          </div>
        </div>
        <ul class="warnings hidden" id="warnings"></ul>
        <details class="sent">
          <summary>What Morphix sent to your provider</summary>
          <pre id="sent-context"></pre>
        </details>
        <div class="decision-actions">
          <button class="primary-row" id="accept-draft" type="button">Apply style</button>
          <button id="discard-draft" type="button">Discard preview</button>
        </div>
      </section>
    </main>
    <script src="../shared/browser-api.js"></script>
    <script src="../shared/styles.js"></script>
    <script src="../shared/gallery-client.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
